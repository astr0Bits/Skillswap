<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Sponsorships – SkillSwap</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/sponsor.css">
</head>
<body>

    <a href="sponsor-dashboard.html" class="sidebar-logo">
        <div class="sidebar-logo-icon">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
                <path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
            </svg>
        </div>
        <span class="sidebar-logo-text">SkillSwap</span>
    </a>
    <nav class="nav-section">
        <p class="nav-label">Overview</p>
        <a href="sponsor-dashboard.html" class="nav-link">
            <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
            <span>Dashboard</span>
        </a>
        <p class="nav-label">Manage</p>
        <a href="sponsor-sponsorships.html" class="nav-link active">
            <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            <span>Sponsorships</span>
        </a>
        <a href="sponsor-coupons.html" class="nav-link">
            <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 12V22H4V12"/><path d="M22 7H2v5h20V7z"/><path d="M12 22V7"/></svg>
            <span>Coupons</span>
        </a>
        <a href="sponsor-talent.html" class="nav-link">
            <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
            <span>Talent Pool</span>
        </a>
        <p class="nav-label">Insights</p>
        <a href="sponsor-reports.html" class="nav-link">
            <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
            <span>Reports</span>
        </a>
        <p class="nav-label">Account</p>
        <a href="sponsor-profile.html" class="nav-link">
            <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
            <span>Profile &amp; Settings</span>
        </a>
    </nav>
    <div class="sidebar-footer">
        <div class="user-avatar-sm" id="sidebarAvatar">SP</div>
        <div class="user-details">
            <h4 id="sidebarName">Organization</h4>
            <p>Sponsor</p>
        </div>
        <button class="logout-btn" onclick="logout()" title="Log out">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
        </button>
    </div>
</aside>

<div class="main">
    <header class="topbar">
        <span class="topbar-title">Sponsorship Management</span>
    </header>

    <div class="page">

        <!-- Create Program -->
        <div class="card">
            <div class="card-header">
                <div class="card-title">
                    <div class="card-icon">
                        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    </div>
                    Create New Program
                </div>
            </div>
            <div class="card-body">
                <div id="formMsg" style="display:none;padding:10px 14px;border-radius:8px;margin-bottom:14px;font-size:14px;"></div>
                <form id="programForm">
                    <div style="display:flex;flex-direction:column;gap:14px;">
                        <div class="field">
                            <label>Program Title</label>
                            <input type="text" name="title" placeholder="e.g. Tech Scholarship 2025" required/>
                        </div>
                        <div class="field">
                            <label>Description</label>
                            <textarea name="description" rows="2" placeholder="Describe the program and its goals..."></textarea>
                        </div>
                        <div style="max-width:220px;">
                            <div class="field">
                                <label>Status</label>
                                <select name="status">
                                    <option value="ACTIVE">Active</option>
                                    <option value="PENDING">Pending</option>
                                    <option value="INACTIVE">Inactive</option>
                                </select>
                            </div>
                        </div>
                        <div class="btn-row">
                            <button type="reset" class="btn btn-ghost">Clear</button>
                            <button type="submit" id="submitBtn" class="btn btn-primary">Create Program</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <!-- Programs Table -->
        <div class="card">
            <div class="section-head">
                <span class="section-title">All Programs</span>
                <span id="totalCount" style="font-size:12px;color:var(--muted);">0 total</span>
            </div>
            <table id="programsTable" style="display:none;">
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Description</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="programsTbody"></tbody>
            </table>
            <div id="programsEmpty" class="empty-state">
                No programs yet. Create one above.
            </div>
        </div>

    </div>
</div>

<script>
    const token = localStorage.getItem('jwtToken');
    if (!token) { window.location.href = '/login.html'; }

    function authHeaders(extra) {
        return Object.assign({ 'Authorization': 'Bearer ' + token }, extra || {});
    }

    function escHtml(str) {
        const d = document.createElement('div');
        d.textContent = str || '';
        return d.innerHTML;
    }

    async function loadUserInfo() {
        try {
            const res = await fetch('/api/auth/me', { headers: authHeaders() });
            if (res.ok) {
                const u = await res.json();
                const name = u.name || u.username || 'Sponsor';
                document.getElementById('sidebarName').textContent = name;
                document.getElementById('sidebarAvatar').textContent = name.substring(0, 2).toUpperCase();
            }
        } catch (e) { /* non-blocking */ }
    }

    async function loadPrograms() {
        try {
            const res = await fetch('/api/sponsors/programs', { headers: authHeaders() });
            if (!res.ok) return;
            const programs = await res.json();
            const tbody  = document.getElementById('programsTbody');
            const table  = document.getElementById('programsTable');
            const empty  = document.getElementById('programsEmpty');
            const count  = document.getElementById('totalCount');

            count.textContent = programs.length + ' total';

            if (programs.length === 0) {
                table.style.display = 'none';
                empty.style.display = '';
            } else {
                empty.style.display = 'none';
                table.style.display = '';
                tbody.innerHTML = programs.map(p => {
                    const cls = p.status === 'ACTIVE' ? 'badge-active'
                              : p.status === 'PENDING' ? 'badge-pending'
                              : 'badge-inactive';
                    return `<tr>
                        <td style="font-weight:600;">${escHtml(p.title)}</td>
                        <td style="color:var(--muted);">${escHtml(p.description)}</td>
                        <td><span class="badge ${cls}">${escHtml(p.status)}</span></td>
                    </tr>`;
                }).join('');
            }
        } catch (e) { /* non-blocking */ }
    }

    document.getElementById('programForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const msg    = document.getElementById('formMsg');
        const btn    = document.getElementById('submitBtn');
        msg.style.display = 'none';
        btn.disabled = true;
        btn.textContent = 'Creating…';

        const fd = new FormData(this);
        const payload = {
            title:       fd.get('title'),
            description: fd.get('description') || '',
            status:      fd.get('status') || 'ACTIVE'
        };

        try {
            const res = await fetch('/api/sponsors/programs', {
                method: 'POST',
                headers: authHeaders({ 'Content-Type': 'application/json' }),
                body: JSON.stringify(payload)
            });

            if (res.ok) {
                msg.style.cssText = 'display:block;padding:10px 14px;border-radius:8px;margin-bottom:14px;font-size:14px;background:#dcfce7;color:#166534;border:1px solid #bbf7d0;';
                msg.textContent = 'Program created successfully!';
                this.reset();
                await loadPrograms();
            } else {
                const err = await res.json().catch(() => ({}));
                msg.style.cssText = 'display:block;padding:10px 14px;border-radius:8px;margin-bottom:14px;font-size:14px;background:#fee2e2;color:#991b1b;border:1px solid #fecaca;';
                msg.textContent = err.error || 'Failed to create program. Please try again.';
            }
        } catch (ex) {
            msg.style.cssText = 'display:block;padding:10px 14px;border-radius:8px;margin-bottom:14px;font-size:14px;background:#fee2e2;color:#991b1b;border:1px solid #fecaca;';
            msg.textContent = 'Network error — please check your connection and try again.';
        } finally {
            btn.disabled = false;
            btn.textContent = 'Create Program';
        }
    });

    function logout() {
        localStorage.removeItem('jwtToken');
        document.cookie = 'jwtToken=; path=/; max-age=0';
        window.location.href = '/login.html';
    }

    loadUserInfo();
    loadPrograms();
</script>
</body>
</html>
