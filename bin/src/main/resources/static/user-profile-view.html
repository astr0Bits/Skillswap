<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Profile – SkillSwap</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,600;0,9..144,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --indigo: #4f46e5; --indigo-light: #e0e7ff; --green: #10b981; --green-light: #d1fae5;
      --amber: #f59e0b; --amber-light: #fef3c7; --rose: #f43f5e; --text: #0f172a;
      --muted: #64748b; --border: #e2e8f0; --bg: #f8faff; --radius: 14px; --shadow: 0 4px 20px rgba(0,0,0,0.06);
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; }

    /* Sidebar */
    .sidebar { width: 240px; background: white; border-right: 1px solid var(--border); height: 100vh; position: fixed; left: 0; top: 0; display: flex; flex-direction: column; z-index: 50; }
    .sidebar-logo { display: flex; align-items: center; gap: 9px; text-decoration: none; padding: 22px 20px; border-bottom: 1px solid var(--border); }
    .sidebar-logo-icon { width: 32px; height: 32px; background: var(--indigo); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; }
    .sidebar-logo-text { font-family: 'Fraunces', serif; font-size: 19px; font-weight: 600; color: var(--indigo); }
    .nav-section { padding: 20px 12px; flex: 1; overflow-y: auto; }
    .nav-label { font-size: 10px; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); padding: 0 10px; margin-bottom: 8px; margin-top: 16px; }
    .nav-link { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 9px; text-decoration: none; color: var(--muted); font-size: 14px; font-weight: 500; transition: all .18s; margin-bottom: 2px; }
    .nav-link:hover, .nav-link.active { background: var(--indigo-light); color: var(--indigo); }
    .sidebar-footer { padding: 16px 20px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
    .user-avatar-sm { width: 36px; height: 36px; background: linear-gradient(135deg, var(--indigo), #818cf8); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 14px; font-weight: 600; flex-shrink: 0; }
    .user-info h4 { font-size: 13px; font-weight: 500; }
    .user-info p  { font-size: 11px; color: var(--muted); }
    .logout-btn { margin-left: auto; background: none; border: none; cursor: pointer; color: var(--muted); padding: 4px; }
    .logout-btn:hover { color: var(--rose); }

    /* Main */
    .main { margin-left: 240px; flex: 1; min-width: 0; }
    .topbar { background: rgba(248,250,255,.88); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 14px 32px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
    .topbar-title { font-family: 'Fraunces', serif; font-size: 1.3rem; font-weight: 600; color: var(--indigo); }
    .page { padding: 32px; max-width: 1100px; }

    /* Profile hero */
    .profile-hero {
      background: white; border: 1px solid var(--border); border-radius: var(--radius);
      padding: 32px; margin-bottom: 24px; box-shadow: var(--shadow);
      display: flex; align-items: flex-start; gap: 28px;
    }
    .profile-avatar {
      width: 80px; height: 80px; border-radius: 50%;
      background: linear-gradient(135deg, var(--indigo), #818cf8);
      display: flex; align-items: center; justify-content: center;
      color: white; font-family: 'Fraunces', serif; font-size: 2.4rem; font-weight: 700; flex-shrink: 0;
    }
    .profile-hero-info h1 { font-family: 'Fraunces', serif; font-size: 1.7rem; font-weight: 700; margin-bottom: 6px; }
    .meta-row { display: flex; align-items: center; flex-wrap: wrap; gap: 14px; margin-bottom: 12px; font-size: 14px; color: var(--muted); }
    .meta-item { display: flex; align-items: center; gap: 5px; }
    .role-badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; background: var(--indigo-light); color: var(--indigo); }
    .rating-summary { display: flex; align-items: center; gap: 6px; }
    .rating-value { font-weight: 600; font-size: 16px; color: var(--amber); }
    .stars { color: var(--amber); font-size: 13px; }
    .stat-pills { display: flex; gap: 16px; flex-wrap: wrap; }
    .stat-pill { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 10px 16px; text-align: center; }
    .stat-pill-value { font-family: 'Fraunces', serif; font-size: 1.5rem; font-weight: 700; }
    .stat-pill-label { font-size: 11px; color: var(--muted); }

    /* Grid */
    .profile-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .card { background: white; border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow); }
    .card-title { font-family: 'Fraunces', serif; font-size: 1rem; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .card-title i { color: var(--indigo); }

    /* Skills */
    .skill-tag {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; margin: 3px;
    }
    .skill-mentor { background: var(--green-light); color: #047857; }
    .skill-learn  { background: var(--amber-light); color: #92400e; }
    .level-dot { font-size: 10px; opacity: .7; }

    /* Badges */
    .badge-grid { display: flex; flex-wrap: wrap; gap: 8px; }
    .badge-item { display: flex; align-items: center; gap: 6px; background: var(--bg); border: 1px solid var(--border); padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; }

    /* Reviews */
    .review-item { padding: 14px 0; border-bottom: 1px solid var(--border); }
    .review-item:last-child { border-bottom: none; }
    .review-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    .reviewer-name { font-weight: 500; font-size: 13px; }
    .review-date   { font-size: 11px; color: var(--muted); }
    .star-badge    { background: var(--amber-light); color: #92400e; padding: 3px 8px; border-radius: 12px; font-size: 12px; font-weight: 600; }
    .review-comment { font-size: 13px; color: var(--muted); line-height: 1.55; }

    .empty-msg { color: var(--muted); font-size: 13px; font-style: italic; }
    .loading-spinner { text-align: center; padding: 40px; color: var(--muted); }
    .spinner { display: inline-block; width: 30px; height: 30px; border: 3px solid var(--border); border-top-color: var(--indigo); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 900px) { .sidebar { width: 52px; } .sidebar-logo-text, .nav-link span, .nav-label, .user-info, .logout-btn { display: none; } .main { margin-left: 52px; } .profile-grid { grid-template-columns: 1fr; } .profile-hero { flex-direction: column; } }
    @media (max-width: 640px) { .page { padding: 16px; } }
  </style>
</head>
<body>

<aside class="sidebar">
  <a href="/dashboard.html" class="sidebar-logo">
    <div class="sidebar-logo-icon">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
        <path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
      </svg>
    </div>
    <span class="sidebar-logo-text">SkillSwap</span>
  </a>
  <nav class="nav-section">
    <p class="nav-label">Main</p>
    <a href="/dashboard.html" class="nav-link">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      <span>Dashboard</span>
    </a>
    <a href="/userProfile.html" class="nav-link">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>Profile</span>
    </a>
    <p class="nav-label">Discover</p>
    <a href="/ai-matching.html" class="nav-link">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
      <span>AI Matching</span>
    </a>
    <a href="/browse-skills.html" class="nav-link">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <span>Browse Skills</span>
    </a>
    <a href="/sessions.html" class="nav-link">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      <span>Sessions</span>
    </a>
  </nav>
  <div class="sidebar-footer">
    <div class="user-avatar-sm" id="sidebarAvatar">U</div>
    <div class="user-info">
      <h4 id="sidebarName">—</h4>
      <p id="sidebarRole">Member</p>
    </div>
    <button class="logout-btn" id="logoutBtn" title="Log out">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/>
      </svg>
    </button>
  </div>
</aside>

<div class="main">
  <header class="topbar">
    <span class="topbar-title">User Profile</span>
    <button onclick="history.back()" style="background:none;border:none;cursor:pointer;font-size:13px;color:var(--muted);">← Back</button>
  </header>

  <div class="page">
    <div id="loadingState" class="loading-spinner">
      <div class="spinner"></div>
      <p style="margin-top:12px;">Loading profile…</p>
    </div>

    <div id="errorState" style="display:none;padding:40px;text-align:center;color:var(--rose);">
      <i class="fas fa-exclamation-circle" style="font-size:2rem;margin-bottom:12px;display:block;"></i>
      <p id="errorMsg">Failed to load profile.</p>
      <a href="/browse-skills.html" style="font-size:13px;color:var(--indigo);text-decoration:none;margin-top:12px;display:inline-block;">Browse Skills</a>
    </div>

    <div id="profileContent" style="display:none;">
      <!-- Hero -->
      <div class="profile-hero">
        <div class="profile-avatar" id="profileAvatar">U</div>
        <div class="profile-hero-info" style="flex:1;min-width:0;">
          <h1 id="profileName">—</h1>
          <div class="meta-row">
            <span id="roleBadge" class="role-badge"></span>
            <span class="meta-item" id="locationMeta" style="display:none;">
              <i class="fas fa-map-marker-alt"></i>
              <span id="profileLocation"></span>
            </span>
            <div class="rating-summary" id="ratingSummary" style="display:none;">
              <span class="stars" id="starsDisplay"></span>
              <span class="rating-value" id="avgRatingVal">0.0</span>
              <span style="color:var(--muted);font-size:13px;" id="reviewCountLabel">(0 reviews)</span>
            </div>
          </div>
          <div class="stat-pills">
            <div class="stat-pill">
              <div class="stat-pill-value" id="sessionCount">0</div>
              <div class="stat-pill-label">Completed Sessions</div>
            </div>
            <div class="stat-pill" id="ratingPill" style="display:none;">
              <div class="stat-pill-value" id="ratingPillVal">0.0</div>
              <div class="stat-pill-label">Avg Rating</div>
            </div>
          </div>
        </div>
        <div id="bookBtnWrap" style="flex-shrink:0;"></div>
      </div>

      <!-- Grid -->
      <div class="profile-grid">
        <!-- Left col -->
        <div>
          <div class="card" id="mentorSkillsCard" style="display:none; margin-bottom:20px;">
            <div class="card-title"><i class="fas fa-chalkboard-teacher"></i> Teaching Skills</div>
            <div id="mentorSkillsList"></div>
          </div>
          <div class="card" id="learnSkillsCard" style="display:none; margin-bottom:20px;">
            <div class="card-title"><i class="fas fa-graduation-cap"></i> Learning Skills</div>
            <div id="learnSkillsList"></div>
          </div>
          <div class="card" id="badgesCard" style="display:none;">
            <div class="card-title"><i class="fas fa-medal"></i> Earned Badges</div>
            <div class="badge-grid" id="badgeList"></div>
          </div>
        </div>

        <!-- Right col -->
        <div>
          <div class="card">
            <div class="card-title"><i class="fas fa-star"></i> Reviews</div>
            <div id="reviewsList">
              <div class="empty-msg">No reviews yet.</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const token = localStorage.getItem('jwtToken');
if (!token) { window.location.href = '/login.html'; }

function esc(s) {
  if (!s) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function renderStars(r) {
  const f = Math.floor(r), h = (r-f) >= 0.5 ? 1 : 0, e = 5-f-h;
  return '<i class="fas fa-star"></i>'.repeat(f) + (h ? '<i class="fas fa-star-half-alt"></i>' : '') + '<i class="far fa-star"></i>'.repeat(e);
}

async function apiFetch(path, opts = {}) {
  const res = await fetch('/api' + path, {
    ...opts,
    headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json', ...opts.headers }
  });
  if (res.status === 401) { localStorage.removeItem('jwtToken'); window.location.href = '/login.html'; throw new Error('401'); }
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}

async function init() {
  // Load sidebar
  try {
    const me = await apiFetch('/users/me');
    document.getElementById('sidebarAvatar').textContent = (me.name?.[0] || 'U').toUpperCase();
    document.getElementById('sidebarName').textContent   = me.name || '';
    document.getElementById('sidebarRole').textContent   = me.role || 'Member';

    // Store own ID to detect self-view
    window._myId = me.id;
  } catch(e) {}

  const userId = new URLSearchParams(location.search).get('id');
  if (!userId) { showError('No user ID specified.'); return; }

  try {
    const p = await apiFetch('/users/' + userId + '/public-profile');
    renderProfile(p);
  } catch(e) {
    showError('Failed to load profile. The user may not exist.');
  }
}

function showError(msg) {
  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('errorState').style.display = 'block';
  document.getElementById('errorMsg').textContent = msg;
}

function renderProfile(p) {
  document.title = (p.name || 'User') + ' – SkillSwap';
  document.querySelector('.topbar-title').textContent = p.name || 'User Profile';

  document.getElementById('profileAvatar').textContent = (p.name || 'U').charAt(0).toUpperCase();
  document.getElementById('profileName').textContent   = p.name || '—';

  // Role badge
  const roleLabel = p.role === 'SPONSOR' ? 'Sponsor' : p.role === 'LEARNER' ? 'Learner' : p.role;
  document.getElementById('roleBadge').innerHTML =
    '<i class="fas fa-user-circle"></i> ' + roleLabel;

  // Location
  if (p.location) {
    document.getElementById('locationMeta').style.display = 'flex';
    document.getElementById('profileLocation').textContent = p.location;
  }

  // Rating
  if (p.averageRating > 0 || p.totalReviews > 0) {
    document.getElementById('ratingSummary').style.display = 'flex';
    document.getElementById('starsDisplay').innerHTML = renderStars(p.averageRating);
    document.getElementById('avgRatingVal').textContent = (p.averageRating || 0).toFixed(1);
    document.getElementById('reviewCountLabel').textContent = '(' + (p.totalReviews || 0) + ' review' + (p.totalReviews !== 1 ? 's' : '') + ')';
    document.getElementById('ratingPill').style.display = 'block';
    document.getElementById('ratingPillVal').textContent = (p.averageRating || 0).toFixed(1);
  }

  document.getElementById('sessionCount').textContent = p.completedSessions || 0;

  // Book session button (only for other users)
  const userId = new URLSearchParams(location.search).get('id');
  if (String(window._myId) !== String(userId)) {
    document.getElementById('bookBtnWrap').innerHTML =
      `<a href="/browse-skills.html" class="btn" style="background:var(--indigo);color:white;padding:10px 18px;border-radius:9px;font-size:13px;font-weight:600;text-decoration:none;display:inline-flex;align-items:center;gap:6px;">
        <i class="fas fa-calendar-plus"></i> Request Session
      </a>`;
  }

  // Mentor skills
  if (p.mentorSkills && p.mentorSkills.length) {
    document.getElementById('mentorSkillsCard').style.display = 'block';
    document.getElementById('mentorSkillsList').innerHTML = p.mentorSkills.map(s =>
      `<span class="skill-tag skill-mentor">
        ${esc(s.skillName)}
        <span class="level-dot">${s.level || ''}</span>
      </span>`).join('');
  }

  // Learn skills
  if (p.learnSkills && p.learnSkills.length) {
    document.getElementById('learnSkillsCard').style.display = 'block';
    document.getElementById('learnSkillsList').innerHTML = p.learnSkills.map(s =>
      `<span class="skill-tag skill-learn">
        ${esc(s.skillName)}
        <span class="level-dot">${s.level || ''}</span>
      </span>`).join('');
  }

  // Badges
  if (p.badges && p.badges.length) {
    document.getElementById('badgesCard').style.display = 'block';
    document.getElementById('badgeList').innerHTML = p.badges.map(b =>
      `<div class="badge-item">${esc(b.icon)} ${esc(b.name)}</div>`).join('');
  }

  // Reviews
  const reviewsEl = document.getElementById('reviewsList');
  if (p.reviews && p.reviews.length) {
    reviewsEl.innerHTML = p.reviews.map(r => {
      const dateStr = r.date ? new Date(r.date).toLocaleDateString('en-AE', { day:'numeric', month:'short', year:'numeric' }) : '';
      return `
      <div class="review-item">
        <div class="review-header">
          <div>
            <div class="reviewer-name">${esc(r.reviewerName || 'Anonymous')}</div>
            ${dateStr ? `<div class="review-date">${dateStr}</div>` : ''}
          </div>
          <div class="star-badge"><i class="fas fa-star" style="color:var(--amber);"></i> ${r.rating}</div>
        </div>
        ${r.comment ? `<div class="review-comment">${esc(r.comment)}</div>` : ''}
      </div>`;
    }).join('');
  } else {
    reviewsEl.innerHTML = '<div class="empty-msg">No reviews yet.</div>';
  }

  // Show content
  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('profileContent').style.display = 'block';
}

document.getElementById('logoutBtn').addEventListener('click', () => {
  localStorage.removeItem('jwtToken');
  window.location.href = '/login.html';
});

init();
</script>
</body>
</html>
