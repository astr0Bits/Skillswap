<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Reviews – SkillSwap</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,600;0,9..144,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --indigo: #4f46e5; --indigo-light: #e0e7ff; --green: #10b981;
      --amber: #f59e0b; --rose: #f43f5e; --text: #0f172a; --muted: #64748b;
      --border: #e2e8f0; --bg: #f8faff; --radius: 14px; --shadow: 0 4px 20px rgba(0,0,0,0.06);
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; }

    /* Sidebar */
    .sidebar {
      width: 240px; background: white; border-right: 1px solid var(--border);
      height: 100vh; position: fixed; left: 0; top: 0; display: flex; flex-direction: column; z-index: 50;
    }
    .sidebar-logo { display: flex; align-items: center; gap: 9px; text-decoration: none; padding: 22px 20px; border-bottom: 1px solid var(--border); }
    .sidebar-logo-icon { width: 32px; height: 32px; background: var(--indigo); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; }
    .sidebar-logo-text { font-family: 'Fraunces', serif; font-size: 19px; font-weight: 600; color: var(--indigo); }
    .nav-section { padding: 20px 12px; flex: 1; overflow-y: auto; }
    .nav-label { font-size: 10px; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); padding: 0 10px; margin-bottom: 8px; margin-top: 16px; }
    .nav-link { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 9px; text-decoration: none; color: var(--muted); font-size: 14px; font-weight: 500; transition: all .18s; margin-bottom: 2px; }
    .nav-link:hover, .nav-link.active { background: var(--indigo-light); color: var(--indigo); }
    .sidebar-footer { padding: 16px 20px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
    .user-avatar-sm { width: 36px; height: 36px; background: linear-gradient(135deg, var(--indigo), #818cf8); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 14px; font-weight: 600; flex-shrink: 0; }
    .user-info h4 { font-size: 13px; font-weight: 500; }
    .user-info p  { font-size: 11px; color: var(--muted); }
    .logout-btn { margin-left: auto; background: none; border: none; cursor: pointer; color: var(--muted); padding: 4px; }
    .logout-btn:hover { color: var(--rose); }

    /* Main */
    .main { margin-left: 240px; flex: 1; min-width: 0; }
    .topbar { background: rgba(248,250,255,.88); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 14px 32px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
    .topbar-title { font-family: 'Fraunces', serif; font-size: 1.3rem; font-weight: 600; color: var(--indigo); }
    .page { padding: 32px; max-width: 900px; }

    /* Rating summary */
    .rating-hero {
      background: white; border: 1px solid var(--border); border-radius: var(--radius);
      padding: 32px; margin-bottom: 24px; display: flex; align-items: center; gap: 32px;
      box-shadow: var(--shadow);
    }
    .rating-big { font-family: 'Fraunces', serif; font-size: 4rem; font-weight: 700; color: var(--amber); line-height: 1; }
    .rating-stars { font-size: 1.4rem; color: var(--amber); margin-bottom: 4px; }
    .rating-count { font-size: 14px; color: var(--muted); }

    /* Bars */
    .rating-bars { flex: 1; display: flex; flex-direction: column; gap: 6px; }
    .bar-row { display: flex; align-items: center; gap: 8px; font-size: 12px; }
    .bar-label { width: 12px; text-align: right; color: var(--muted); }
    .bar-track { flex: 1; height: 6px; background: var(--border); border-radius: 3px; }
    .bar-fill  { height: 6px; background: var(--amber); border-radius: 3px; }
    .bar-count { width: 20px; color: var(--muted); }

    /* Review list */
    .section-title { font-family: 'Fraunces', serif; font-size: 1.2rem; font-weight: 600; margin-bottom: 16px; }
    .review-card {
      background: white; border: 1px solid var(--border); border-radius: var(--radius);
      padding: 20px 24px; margin-bottom: 14px; box-shadow: var(--shadow);
    }
    .review-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .reviewer-info { display: flex; align-items: center; gap: 10px; }
    .reviewer-av { width: 36px; height: 36px; border-radius: 50%; background: var(--indigo-light); color: var(--indigo); display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 14px; flex-shrink: 0; }
    .reviewer-name { font-weight: 500; font-size: 14px; }
    .review-date  { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .star-badge { background: #fef3c7; color: #92400e; padding: 4px 10px; border-radius: 20px; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 4px; }
    .review-comment { font-size: 14px; color: var(--text); line-height: 1.6; }
    .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty-state i { font-size: 2rem; margin-bottom: 12px; display: block; }

    @media (max-width: 900px) { .sidebar { width: 52px; } .sidebar-logo-text, .nav-link span, .nav-label, .user-info, .logout-btn { display: none; } .main { margin-left: 52px; } .rating-hero { flex-direction: column; gap: 20px; } }
    @media (max-width: 640px) { .page { padding: 16px; } }
  </style>
</head>
<body>

<aside class="sidebar">
  <a href="/dashboard.html" class="sidebar-logo">
    <div class="sidebar-logo-icon">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
        <path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
      </svg>
    </div>
    <span class="sidebar-logo-text">SkillSwap</span>
  </a>
  <nav class="nav-section">
    <p class="nav-label">Main</p>
    <a href="/dashboard.html" class="nav-link">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      <span>Dashboard</span>
    </a>
    <a href="/userProfile.html" class="nav-link">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>Profile</span>
    </a>
    <p class="nav-label">Discover</p>
    <a href="/browse-skills.html" class="nav-link">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <span>Browse Skills</span>
    </a>
    <a href="/sessions.html" class="nav-link active">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      <span>Sessions</span>
    </a>
  </nav>
  <div class="sidebar-footer">
    <div class="user-avatar-sm" id="sidebarAvatar">U</div>
    <div class="user-info">
      <h4 id="sidebarName">—</h4>
      <p id="sidebarRole">Member</p>
    </div>
    <button class="logout-btn" id="logoutBtn" title="Log out">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/>
      </svg>
    </button>
  </div>
</aside>

<div class="main">
  <header class="topbar">
    <span class="topbar-title">My Reviews</span>
    <a href="/dashboard.html" style="font-size:13px;color:var(--muted);text-decoration:none;">← Dashboard</a>
  </header>

  <div class="page">
    <div id="ratingHero" class="rating-hero" style="display:none;">
      <div style="text-align:center;min-width:100px;">
        <div class="rating-big" id="avgRatingBig">0.0</div>
        <div class="rating-stars" id="starsDisplay"></div>
        <div class="rating-count" id="ratingCount">0 reviews</div>
      </div>
      <div class="rating-bars" id="ratingBars"></div>
    </div>

    <div class="section-title">All Reviews</div>
    <div id="reviewsList"></div>
  </div>
</div>

<script>
const token = localStorage.getItem('jwtToken');
if (!token) { window.location.href = '/login.html'; }

function esc(s) {
  if (!s) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function renderStars(rating) {
  const full  = Math.floor(rating);
  const half  = (rating - full) >= 0.5 ? 1 : 0;
  const empty = 5 - full - half;
  return '<i class="fas fa-star"></i>'.repeat(full) +
         (half ? '<i class="fas fa-star-half-alt"></i>' : '') +
         '<i class="far fa-star"></i>'.repeat(empty);
}

async function apiFetch(path, opts = {}) {
  const res = await fetch('/api' + path, {
    ...opts,
    headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json', ...opts.headers }
  });
  if (res.status === 401) { localStorage.removeItem('jwtToken'); window.location.href = '/login.html'; throw new Error('401'); }
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}

async function init() {
  try {
    const u = await apiFetch('/users/me');
    document.getElementById('sidebarAvatar').textContent = (u.name?.[0] || 'U').toUpperCase();
    document.getElementById('sidebarName').textContent   = u.name || '';
    document.getElementById('sidebarRole').textContent   = u.role || 'Member';
  } catch(e) {}

  try {
    const reviews = await apiFetch('/reviews/me');
    renderReviews(reviews);
  } catch(e) {
    document.getElementById('reviewsList').innerHTML =
      '<div class="empty-state"><i class="fas fa-exclamation-circle"></i><p>Failed to load reviews.</p></div>';
  }
}

function renderReviews(reviews) {
  if (!reviews.length) {
    document.getElementById('reviewsList').innerHTML =
      '<div class="empty-state"><i class="fas fa-star"></i><h3>No reviews yet</h3><p>Complete sessions as a mentor to start receiving reviews.</p></div>';
    return;
  }

  // Compute average
  const avg = reviews.reduce((s, r) => s + r.rating, 0) / reviews.length;
  const rounded = Math.round(avg * 10) / 10;

  // Distribution
  const counts = [0, 0, 0, 0, 0];
  reviews.forEach(r => { if (r.rating >= 1 && r.rating <= 5) counts[r.rating - 1]++; });
  const max = Math.max(...counts, 1);

  document.getElementById('avgRatingBig').textContent = rounded.toFixed(1);
  document.getElementById('starsDisplay').innerHTML   = renderStars(avg);
  document.getElementById('ratingCount').textContent  = reviews.length + ' review' + (reviews.length !== 1 ? 's' : '');
  document.getElementById('ratingHero').style.display = 'flex';

  const barsHtml = [5, 4, 3, 2, 1].map(star => `
    <div class="bar-row">
      <span class="bar-label">${star}</span>
      <i class="fas fa-star" style="color:var(--amber);font-size:10px;"></i>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.round(counts[star-1]/max*100)}%"></div></div>
      <span class="bar-count">${counts[star-1]}</span>
    </div>`).join('');
  document.getElementById('ratingBars').innerHTML = barsHtml;

  document.getElementById('reviewsList').innerHTML = reviews.map(r => {
    const initials = (r.reviewerName || 'A').charAt(0).toUpperCase();
    const dateStr  = r.createdAt ? new Date(r.createdAt).toLocaleDateString('en-AE', { day:'numeric', month:'short', year:'numeric' }) : '';
    return `
    <div class="review-card">
      <div class="review-header">
        <div class="reviewer-info">
          <div class="reviewer-av">${initials}</div>
          <div>
            <div class="reviewer-name">${esc(r.reviewerName || 'Anonymous')}</div>
            ${dateStr ? `<div class="review-date">${dateStr}</div>` : ''}
          </div>
        </div>
        <div class="star-badge"><i class="fas fa-star"></i> ${r.rating}</div>
      </div>
      ${r.comment ? `<p class="review-comment">${esc(r.comment)}</p>` : ''}
    </div>`;
  }).join('');
}

document.getElementById('logoutBtn').addEventListener('click', () => {
  localStorage.removeItem('jwtToken');
  window.location.href = '/login.html';
});

init();
</script>
</body>
</html>
